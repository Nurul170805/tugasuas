<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perhitungan Bonus Pembelian</title>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h2>Perhitungan Bonus Pembelian</h2>

      <label>Nama Pelanggan</label>
      <input type="text" id="namaPelanggan" />

      <label>Nama Produk</label>
      <input type="text" id="namaProduk" />

      <label>Harga Produk</label>
      
      <input type="number" id="hargaProduk" />

      <label>Jumlah Pembelian</label>
      <input type="number" id="jumlahPembelian" />

      <div class="button-group">
        <button class="btn-count" onclick="hitungBelanja()">count</button>
        <button class="btn-clear" onclick="resetForm()">clear</button>
      </div>

      <p id="error"></p>

      <div id="hasil">
        <h3>Hasil Perhitungan</h3>

        <table>
          <tr>
            <td>Nama Pelanggan</td>
            <td id="outNama"></td>
          </tr>

          <tr>
            <td>Nama Produk</td>
            <td id="outProduk"></td>
          </tr>

          <tr>
            <td>Total Belanja</td>
            <td id="outTotal"></td>
          </tr>

          <tr>
            <td>Potongan</td>
            <td id="outPotongan"></td>
          </tr>

          <tr>
            <td>Total Bayar</td>
            <td id="outBayar"></td>
          </tr>
        </table>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
